    .layout-menu,.layout-navbar,.menu-mobile-toggler,.layout-overlay,.drag-target,.buy-now,.customizer{display:none!important}

<body>
<script>
// ========================================================================
//  RANDOM SENSOR DATA
// ========================================================================
var SENSOR_DATA = (function() {
  var names = [
    "Gateway-Core-01", "Switch-Floor2-A", "AP-Lobby-Main", "Firewall-Edge-01",
    "Router-DC-North", "Switch-Floor3-B"
  ];
  var types = ["Gateway","Switch","Access Point","Firewall","Router","Switch"];

  function randBetween(a,b){return Math.floor(Math.random()*(b-a+1))+a}
  function genLatency12h(){
    var pts=[];var now=Date.now();
    for(var i=0;i<24;i++){
      var t=now-(23-i)*30*60*1000;
      pts.push({x:t,y:Math.round((Math.random()*180+20)*100)/100});
    }
    return pts;
  }

  var sensors=[];
  for(var i=0;i<names.length;i++){
    var isOn = Math.random() > 0.3;
    sensors.push({
      id: "SEN-"+(1001+i),
      name: names[i],
      type: types[i],
      status: isOn ? "on" : "off",
      avgLatency: isOn ? (Math.random()*60+5).toFixed(1) : "0",
      latencyHistory: genLatency12h()
    });
  }
  return sensors;
})();
</script>

<div class="layout-wrapper layout-content-navbar" style="padding-left:0!important">
  <div class="layout-container" style="padding-left:0!important">
    <div class="layout-page" style="padding-left:0!important;width:100%!important">
      <div class="content-wrapper">
        <div class="container-xxl flex-grow-1 container-p-y">

          <div class="row mb-6">
            <!-- Exact Original Growth UI (used for Sensor Health) -->
            <div class="col-lg-4 col-md-6 mb-6 mb-lg-0">
              <div class="card h-100">
                <div class="card-body px-xl-9 py-12 d-flex align-items-center flex-column">
                  <div class="text-center mb-6">
                    <div class="btn-group">
                      <button type="button" class="btn btn-label-primary">
                        <script>document.write(new Date().getFullYear());</script>
                      </button>
                      <button type="button" class="btn btn-label-primary dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="visually-hidden">Toggle Dropdown</span>
                      </button>
                      <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="javascript:void(0);">Select Range</a></li>
                      </ul>
                    </div>
                  </div>

                  <div id="growthChart"></div>
                  <div class="text-center fw-medium my-6" id="healthLabel">62% Company Growth</div>

                  <div class="d-flex gap-11 justify-content-between">
                    <div class="d-flex">
                      <div class="avatar me-2">
                        <span class="avatar-initial rounded-2 bg-label-success"><i class="icon-base bx bx-wifi icon-lg text-success"></i></span>
                      </div>
                      <div class="d-flex flex-column">
                        <small>Online</small>
                        <h6 class="mb-0" id="countOn">0</h6>
                      </div>
                    </div>
                    <div class="d-flex">
                      <div class="avatar me-2">
                        <span class="avatar-initial rounded-2 bg-label-danger"><i class="icon-base bx bx-wifi-off icon-lg text-danger"></i></span>
                      </div>
                      <div class="d-flex flex-column">
                        <small>Down</small>
                        <h6 class="mb-0" id="countOff">0</h6>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Exact Original Transactions UI -->
            <div class="col-lg-8 col-md-6">
              <div class="card h-100">
                <div class="card-header d-flex align-items-center justify-content-between">
                  <h5 class="card-title m-0 me-2">Transactions (Sensors)</h5>
                  <div class="dropdown">
                    <button class="btn text-body-secondary p-0" type="button" id="transactionID" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                      <i class="icon-base bx bx-dots-vertical-rounded icon-lg"></i>
                    </button>
                    <div class="dropdown-menu dropdown-menu-end" aria-labelledby="transactionID">
                      <a class="dropdown-item" href="javascript:void(0);">Last 28 Days</a>
                      <a class="dropdown-item" href="javascript:void(0);">Last Month</a>
                      <a class="dropdown-item" href="javascript:void(0);">Last Year</a>
                    </div>
                  </div>
                </div>
                <div class="card-body pt-4">
                  <ul class="p-0 m-0" id="sensorList">
                    <!-- Javascript will populate this with original LI structure -->
                  </ul>
                </div>
              </div>
            </div>
          </div>

          <!-- Exact Original Total Balance UI -->
          <div class="row">
            <div class="col-12 mb-6" id="latencyCardContainer" style="display:none;">
              <div class="card h-100">

                <div class="card-body">
                  <div class="tab-content p-0">
                    <div class="tab-pane fade show active" id="navs-tabs-line-card-income" role="tabpanel">
                      <div class="d-flex mb-6">
                        <div class="avatar flex-shrink-0 me-3">
                          <img src="static/img/icons/unicons/wallet-primary.png" alt="User" />
                        </div>
                        <div>
                          <p class="mb-0" id="latencyTitle">Total Balance</p>
                          <div class="d-flex align-items-center">
                            <h6 class="mb-0 me-1" id="latencyValue">$459.10</h6>
                            <small class="text-success fw-medium" id="latencyTrend">
                              <i class="icon-base bx bx-chevron-up icon-lg"></i>
                              42.9%
                            </small>
                          </div>
                        </div>
                      </div>
                      <div id="incomeChart"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="static/vendor/libs/jquery/jquery.js"></script>
<script src="static/vendor/libs/popper/popper.js"></script>
<script src="static/vendor/js/bootstrap.js"></script>
<script src="static/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
<script src="static/vendor/libs/hammer/hammer.js"></script>
<script src="static/vendor/libs/i18n/i18n.js"></script>
<script src="static/vendor/js/menu.js"></script>
<script src="static/vendor/libs/apex-charts/apexcharts.js"></script>
<script src="static/js/main.js"></script>

<script>
(function() {
  'use strict';

  var sensors = SENSOR_DATA;
  var totalSensors = sensors.length;
  var onSensors = sensors.filter(function(s){return s.status==='on'}).length;
  var offSensors = totalSensors - onSensors;
  var onlinePct = Math.round((onSensors/totalSensors)*100);

  document.getElementById('healthLabel').textContent = onlinePct + '% Online';
  document.getElementById('countOn').textContent = onSensors;
  document.getElementById('countOff').textContent = offSensors;

  // Exact configuration for growthChart from sneat dashboards-analytics.js
  var growthChartOptions = {
    series: [onlinePct],
    labels: ['Growth'],
    chart: { height: 240, type: 'radialBar' },
    plotOptions: {
      radialBar: {
        size: 150, offsetY: 10, startAngle: -150, endAngle: 150, hollow: { size: '55%' },
        track: { background: '#ebebeb', strokeWidth: '100%' },
        dataLabels: {
          name: { offsetY: 15, color: '#697a8d', fontSize: '15px', fontWeight: '500', fontFamily: 'Public Sans' },
          value: { offsetY: -25, color: '#566a7f', fontSize: '22px', fontWeight: '500', fontFamily: 'Public Sans' }
        }
      }
    },
    colors: ['#696cff'], // primary color
    fill: {
      type: 'gradient',
      gradient: {
        shade: 'dark', shadeIntensity: 0.5,
        gradientToColors: ['#696cff'],
        inverseColors: true, opacityFrom: 1, opacityTo: 0.6, stops: [30, 70, 100]
      }
    },
    stroke: { dashArray: 5 }
  };
  var growthChart = new ApexCharts(document.getElementById('growthChart'), growthChartOptions);
  growthChart.render();

  // Populate Transactions list
  var list = document.getElementById('sensorList');
  var icons = ["paypal.png","wallet.png","chart.png","cc-primary.png","cc-warning.png"];
  
  sensors.forEach(function(s, idx) {
    var icon = icons[idx % icons.length];
    var isOn = s.status === 'on';
    var badgeClass = isOn ? 'text-success' : 'text-danger';
    var sign = isOn ? '+' : '-';
    var val = s.avgLatency;

    var li = document.createElement('li');
    li.className = "d-flex align-items-center " + (idx < sensors.length-1 ? "mb-6" : "");
    li.innerHTML = `
      <div class="avatar flex-shrink-0 me-3">
        <img src="static/img/icons/unicons/${icon}" alt="User" class="rounded" />
      </div>
      <div class="d-flex w-100 flex-wrap align-items-center justify-content-between gap-2">
        <div class="me-2">
          <small class="d-block">${s.type}</small>
          <h6 class="fw-normal mb-0">${s.name}</h6>
        </div>
        <div class="user-progress d-flex align-items-center gap-2">
          <h6 class="fw-normal mb-0 ${badgeClass}">${sign}${val}</h6>
          <span class="text-body-secondary">ms</span>
          <button class="btn btn-sm btn-icon btn-outline-primary ms-2" onclick="showChart('${s.id}')" title="View Latency">📈</button>
        </div>
      </div>
    `;
    list.appendChild(li);
  });

  // Income Chart (Latency Chart)
  var incomeChartInstance = null;
  var incomeChartEl = document.getElementById('incomeChart');

  window.showChart = function(id) {
    var s = sensors.find(function(x){return x.id === id});
    if (!s) return;

    document.getElementById('latencyCardContainer').style.display = 'block';
    document.getElementById('latencyTitle').textContent = s.name + ' - Latency';
    document.getElementById('latencyValue').textContent = s.avgLatency + ' ms';
    document.getElementById('latencyTrend').innerHTML = s.status === 'on' 
      ? '<i class="icon-base bx bx-check icon-lg"></i> Online' 
      : '<i class="icon-base bx bx-x icon-lg text-danger"></i> <span class="text-danger">Offline</span>';

    // Original incomeChart config from sneat
    var options = {
      series: [{ name: 'Latency', data: s.latencyHistory.map(function(d){return d.y}) }],
      chart: {
        height: 215, parentHeightOffset: 0, parentWidthOffset: 0, toolbar: { show: false }, type: 'area'
      },
      dataLabels: { enabled: false },
      stroke: { width: 2, curve: 'smooth' },
      legend: { show: false },
      markers: { size: 6, colors: 'transparent', strokeColors: 'transparent', strokeWidth: 4, discrete: [{ fillColor: '#fff', seriesIndex: 0, dataPointIndex: 23, strokeColor: '#696cff', strokeWidth: 2, size: 6, radius: 8 }], hover: { size: 7 } },
      colors: ['#696cff'],
      fill: { type: 'gradient', gradient: { shade: 'light', shadeIntensity: 0.6, opacityFrom: 0.5, opacityTo: 0.25, stops: [0, 95, 100] } },
      grid: { borderColor: '#e7e7e8', strokeDashArray: 3, padding: { top: -20, bottom: -8, left: -10, right: 8 } },
      xaxis: {
        categories: s.latencyHistory.map(function(d){ var dt=new Date(d.x); return dt.getHours()+':'+(dt.getMinutes()<10?'0':'')+dt.getMinutes() }),
        axisBorder: { show: false }, axisTicks: { show: false }, labels: { show: true, style: { fontSize: '13px', colors: '#697a8d' } }
      },
      yaxis: { labels: { show: false }, min: 0, max: Math.max.apply(null, s.latencyHistory.map(function(d){return d.y})) + 50, tickAmount: 4 }
    };

    if (incomeChartInstance) {
      incomeChartInstance.destroy();
    }
    incomeChartInstance = new ApexCharts(incomeChartEl, options);
    incomeChartInstance.render();
    
    // Scroll to chart
    setTimeout(function(){
      document.getElementById('latencyCardContainer').scrollIntoView({behavior: 'smooth', block: 'start'});
    }, 100);
  };

})();
</script>
</body>
